  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0f172a; /* Сделал фон чуть темнее для лучшего контраста свечения, можно вернуть #f1f5f9 если нужен светлый */
      --bg-light: #f1f5f9;
      --panel: rgba(255, 255, 255, 0.65);
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #7c3aed;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg-light);
      background-image: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      overflow-x: hidden;
    }

    /* Интенсивный Глассморфизм */
    .glass-card {
      background: var(--panel);
      border-radius: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* Внутреннее свечение (фон) */
.glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  /* 800px - это радиус. Цвета: фиолетовый, розовый, голубой */
  background: radial-gradient(
    800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(168, 85, 247, 0.12),
    rgba(236, 72, 153, 0.08),
    rgba(56, 189, 248, 0.08),
    transparent 40%
  );
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 1;
}

/* Свечение самой рамки (бордера) */
.glass-card::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 4px;
  /* 600px - это радиус. Добавили радужный градиент */
  background: radial-gradient(
    300px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(168, 85, 247, 0.9),    /* Фиолетовый */
    rgba(255, 0, 0, 0.9) 25%, 
    rgba(16, 185, 129, 0.9) 65%, /* Изумрудный */
    rgba(59, 130, 246, 0.9) 75%, /* Синий */
    transparent 100%
  ); 
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 2;
}


    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px -10px rgba(124, 58, 237, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
    }

    .glass-card:hover::before,
    .glass-card:hover::after {
      opacity: 1;
    }

    .glass-card > * { position: relative; z-index: 3; }

    
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
/* Анимация скрытия формы создания (Фиолетовая линия) */
.form-reveal-container {
  max-width: 120px; /* Изначальная ширина линии */
  max-height: 6px;  /* Изначальная высота линии */
  margin: -10px auto 30px; /* Чуть приподнимаем к заголовку */
  background: linear-gradient(90deg, #a855f7, #7c3aed, #c084fc);
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.5);
  cursor: pointer;
}

/* Убираем синюю обводку при клике */
.form-reveal-container:focus {
  outline: none;
}

/* Состояние, когда линия расширяется (при наведении или клике) */
.form-reveal-container:hover,
.form-reveal-container:focus,
.form-reveal-container:focus-within {
  max-width: 100%;
  max-height: 400px; /* Разворачиваем высоту */
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(168, 85, 247, 0.4);
  border-radius: 1.25rem;
  cursor: default;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* Скрытый контент внутри линии */
.reveal-content {
  padding: 24px;
  opacity: 0;
  transform: translateY(-15px);
  transition: all 0.4s ease;
  pointer-events: none;
}

/* Появление контента после того, как карточка разъехалась */
.form-reveal-container:hover .reveal-content,
.form-reveal-container:focus .reveal-content,
.form-reveal-container:focus-within .reveal-content {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  transition-delay: 0.15s;
}

    /* Модальные Окна */
    .modal {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; backdrop-filter: blur(12px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal.show { opacity: 1; pointer-events: auto; }
    
    .modal-box { 
      width: 90%; max-width: 400px; padding: 30px 24px; text-align: center;
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal.show .modal-box { transform: scale(1); }
    .modal-box h3 { margin-bottom: 12px; color: #1e293b; font-size: 1.6rem; font-weight: 800; }
    .modal-box p { color: var(--muted); margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4; }
    
    .modal-actions { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
    .btn-cancel { background: rgba(148, 163, 184, 0.2); color: #334155; border: 1px solid rgba(148, 163, 184, 0.3); }
    .btn-cancel:hover { background: rgba(148, 163, 184, 0.4); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }

    /* Базовые стили */
    .container {
      width: 100%; max-width: 720px; padding: 28px; margin: 20px auto;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    h1 {
      margin: 0 0 20px; text-align: center; font-size: clamp(2.5rem, 4vw, 3.5rem);
      font-weight: 800; letter-spacing: 1px; text-transform: uppercase;

      text-shadow: 0 0 30px rgba(168, 85, 247, 0.2); position: relative;
    }

    .form-grid { display: grid; gap: 3px; margin-bottom: 24px; }
    .add-board-form { grid-template-columns: 1fr 1fr; }
    .add-item-form { grid-template-columns: 1fr 1fr 0.8fr 0.8fr; }
    .btn-copy {

      color: #64748b; 
      border: 1px solid #e2e8f0; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }
    .btn-copy:hover { 
      background: #f1f5f9; 
      color: var(--accent); 
      border-color: var(--accent); 
    }

    input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      border: 2px solid rgba(0, 0, 0, 0.05); outline: none; text-align: center;
      background: rgba(255, 255, 255, 0.8); color: #000; font-size: 16px; font-family: inherit;
      transition: all 0.3s ease;
    }
    input:focus {
      border-color: var(--accent); background: #fff;
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2), 0 0 20px rgba(168, 85, 247, 0.15);
      transform: translateY(-2px);
    }

    button {
      padding: 14px; border: none; border-radius: 10px; cursor: pointer;
      font-weight: 700; font-size: 15px; font-family: inherit; transition: all 0.2s ease;
    }
    button:active { transform: scale(0.95); }

    .btn-add {
      background: linear-gradient(135deg, #c084fc, #8b5cf6); color: white;
      box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3); text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .btn-add:hover { box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4); transform: translateY(-3px); }

    /* Элементы списков */
    .row-item {
      padding: 18px 24px; border-radius: 1.25rem; margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
    }
    .row-item::before {
      content: ""; position: absolute; left: 0; top: 0; width: 6px; height: 100%;
      background: var(--accent); transition: all 0.3s ease; z-index: 10;
    }
    .row-item:hover {
      transform: translateY(-5px) scale(1.01); background: #ffffff;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    /* Подсветка Топ-3 */
    .rank-gold {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(254, 240, 138, 0.4));
      border: 1px solid rgba(250, 204, 21, 0.6);
      box-shadow: 0 10px 30px rgba(234, 179, 8, 0.2);
    }
    .rank-gold::before { background: linear-gradient(to bottom, #fde047, #eab308); width: 8px; }
    
    .rank-silver {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(226, 232, 240, 0.6));
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 10px 30px rgba(148, 163, 184, 0.2);
    }
    .rank-silver::before { background: linear-gradient(to bottom, #cbd5e1, #94a3b8); width: 8px; }
    
    .rank-bronze {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(254, 215, 170, 0.4));
      border: 1px solid rgba(249, 115, 22, 0.4);
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.15);
    }
    .rank-bronze::before { background: linear-gradient(to bottom, #fdba74, #ea580c); width: 8px; }

    .board-info, .player-info { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .board-title { font-size: 22px; font-weight: 800; color: #1e293b; }
    .board-subtitle { font-size: 15px; color: var(--muted); font-weight: 500; }

    /* Hover Controls */
    .hover-controls {
      display: flex; gap: 10px; justify-content: center;
      opacity: 0; transform: translateY(15px); pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 0; overflow: hidden; margin-top: 0;
    }
    .row-item:hover .hover-controls {
      opacity: 1; transform: translateY(0); pointer-events: auto; height: auto; margin-top: 16px;
    }/* Дополнительная настройка для формы добавления элементов */
#addItemSection .add-item-form {

.lang-custom {
  position: absolute; top: 20px; right: 20px; z-index: 1000;
}

.lang-trigger {
  display: flex; align-items: center; padding: 10px 18px;

.lang-dropdown {

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function beep(f = 600, t = 80, v = 0.05) {
      if(audioCtx.state === 'suspended') return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = f; o.type = "sine"; g.gain.value = v;
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + t / 1000);
    }
    document.addEventListener("click", () => { if (audioCtx.state === "suspended") audioCtx.resume(); }, { once: true });

    // Custom UI Functions
    function uiAlert(title, message) {
      document.getElementById('alertTitle').innerText = title;
      document.getElementById('alertMessage').innerText = message;
      const modal = document.getElementById('customAlert');
      modal.classList.add('show');
      document.getElementById('alertOkBtn').onclick = () => modal.classList.remove('show');
    }

    function uiConfirm(title, message, onConfirm) {
      document.getElementById('confirmTitle').innerText = title;
      document.getElementById('confirmMessage').innerText = message;
      const modal = document.getElementById('customConfirm');
      modal.classList.add('show');
      
      document.getElementById('confirmCancelBtn').onclick = () => modal.classList.remove('show');
      document.getElementById('confirmYesBtn').onclick = () => {
        modal.classList.remove('show');
        onConfirm();
      };
    }

    function uiPrompt(title, message, defaultVal, onSave) {
      document.getElementById('promptTitle').innerText = title;
      document.getElementById('promptMessage').innerText = message;
      const input = document.getElementById('promptInput');
      input.value = defaultVal || '';
      const modal = document.getElementById('customPrompt');
      modal.classList.add('show');
      input.focus();

      document.getElementById('promptCancelBtn').onclick = () => modal.classList.remove('show');
      document.getElementById('promptSaveBtn').onclick = () => {
        modal.classList.remove('show');
        onSave(input.value.trim());
      };
    }

    let allBoards = {};
    let currentBoardId = null;
    let isControlMode = false;
    let currentBoardItems = {};

    const views = {
      loader: document.getElementById('loader'),
      main: document.getElementById('main-view'),
      board: document.getElementById('board-view')
    };

    function showView(viewName) {
      Object.values(views).forEach(v => v.style.display = 'none');
      if(viewName === 'loader') views.loader.style.display = 'flex';
      else views[viewName].style.display = 'block';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const boardFromUrl = urlParams.get('board');

    // Init
        // Флаг, чтобы скрыть загрузчик только один раз при запуске
    let firstLoad = true;

    // Init
    const boardsRef = ref(db, 'boards');
    onValue(boardsRef, (snapshot) => {
      allBoards = snapshot.val() || {};
      
      if (firstLoad) {
        setTimeout(() => { 
          firstLoad = false;
          if (!boardFromUrl) {
            showView('main');
            updateUI();
            renderBoards();
          } else {
            if (allBoards[boardFromUrl]) {
              openBoard(boardFromUrl, false);
            } else {
                            uiAlert(t().error, t().notFound); // Изменено

              window.history.pushState({}, '', '/');
              showView('main');
              renderBoards();
            }
          }
        }, 800);
      } else {
        // Логика обновления данных без перезагрузки экрана
        if (currentBoardId === null) {
          renderBoards(document.getElementById('searchInput').value.toLowerCase());
        } else if (allBoards[currentBoardId]) {
          document.getElementById('currentBoardTitle').innerText = allBoards[currentBoardId].settings.title;
          document.getElementById('currentBoardSubtitle').innerText = allBoards[currentBoardId].settings.subtitle;
        }
      }
    });


    function renderBoards(filterText = "") {
      const container = document.getElementById('boardsList');
      container.innerHTML = "";
      
      Object.keys(allBoards).forEach(boardId => {
        const b = allBoards[boardId].settings;
        if(filterText && !b.title.toLowerCase().includes(filterText) && !b.subtitle.toLowerCase().includes(filterText)) return;

        const el = document.createElement('div');
        el.className = 'row-item glass-card';
        el.innerHTML = `
          <div class="board-info">
            <div>
              <div class="board-title">${b.title}</div>
              <div class="board-subtitle">${b.subtitle}</div>
            </div>
          </div>
                              <div class="hover-controls">
            <div style="display: flex; gap: 10px; width: 100%;">
              <button class="btn-spectate" style="flex: 1; margin: 0;">ᅠᅠ
                <i class="fa-solid fa-eye"></i> ${t().spectateBtn}
              </button>
              <button class="btn-copy" style="aspect-ratio: 1/1; height: 100%; padding: 0; display: flex; align-items: center; justify-content: center; width: 26px; flex-shrink: 0; margin: 0;" title="Copy Link">
                <i class="fa-solid fa-copy"></i>
              </button>
            </div>
            <button class="btn-control"><i class="fa-solid fa-gear"></i> ${t().controlBtn}</button>
            <button class="btn-del"><i class="fa-solid fa-trash"></i> ${t().deleteBtn}</button>
          </div>


        `;

        el.querySelector('.btn-spectate').onclick = () => {
          window.history.pushState({}, '', `?board=${boardId}`);
          openBoard(boardId, false);
        };
        el.querySelector('.btn-copy').onclick = (e) => {
          e.stopPropagation(); // Чтобы не сработало открытие доски
          const encodedId = encodeURIComponent(boardId);
  const url = `imboards.github.io/main?board=${encodedId}`;
          navigator.clipboard.writeText(url).then(() => {
            const icon = el.querySelector('.btn-copy i');
            icon.className = "fa-solid fa-check text-green-500"; // Меняем иконку на галочку
            beep(800, 50); // Твой звуковой сигнал
            
            setTimeout(() => {
              icon.className = "fa-solid fa-copy"; // Возвращаем обратно через 2 сек
            }, 2000);
          }).catch(err => {
            uiAlert(t().error, t().linkerr);
          });
        };
        el.querySelector('.btn-control').onclick = () => {
          document.getElementById('authPass').value = '';
          const modal = document.getElementById('authModal');
          modal.classList.add('show');
          document.getElementById('authPass').focus();

          document.getElementById('authCancel').onclick = () => modal.classList.remove('show');
          document.getElementById('authEnter').onclick = () => {
            if(document.getElementById('authPass').value === b.password) {
              modal.classList.remove('show');
              window.history.pushState({}, '', `?board=${boardId}`);
              openBoard(boardId, true);
            } else {
              uiAlert(t().accessDenied, t().incorrectPass);
            }
          };
        };

        el.querySelector('.btn-del').onclick = () => {
           // Проверка пароля перед удалением
           document.getElementById('authPass').value = '';
           const authModal = document.getElementById('authModal');
          document.getElementById('authTitle').innerText = t().deleteListTitle;
document.getElementById('authDesc').innerText = t().deleteListMsg;

            authModal.classList.add('show');

           document.getElementById('authCancel').onclick = () => authModal.classList.remove('show');
           document.getElementById('authEnter').onclick = () => {
             if(document.getElementById('authPass').value === b.password) {
                authModal.classList.remove('show');
                uiConfirm(t().deleteListTitle, `${t().sureDeleteList} "${b.title}"?`, () => {
  remove(ref(db, `boards/${boardId}`));
                });
             } else {
               uiAlert(t().accessDenied, t().incorrectPass);
                 }
           };
        };

        container.appendChild(el);
      });
      applyGlassEffects();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderBoards(e.target.value.toLowerCase());
    });

    document.getElementById('addBoardBtn').onclick = () => {
      const title = document.getElementById('newBoardTitle').value.trim();
      const subtitle = document.getElementById('newBoardSubtitle').value.trim();
      const pass = document.getElementById('newBoardPass').value;

      if(!title || !pass) return uiAlert(t().warning, t().titleReq);

      // Убираем лишние пробелы по краям, заменяем внутренние пробелы на дефисы 
// и удаляем спецсимволы Firebase
const safeId = title.trim().toLowerCase().replace(/\s+/g, '-').replace(/[.#$[\]]/g, ""); 

      // Check duplicate
      const isDuplicate = Object.values(allBoards).some(b => b.settings.title.toLowerCase() === title.toLowerCase());
      if(isDuplicate) return uiAlert(t().error, t().exists);

      set(ref(db, `boards/${safeId}/settings`), { title, subtitle, password: pass });
      document.getElementById('newBoardTitle').value = "";
      document.getElementById('newBoardSubtitle').value = "";
      document.getElementById('newBoardPass').value = "";
    };

    function openBoard(boardId, controlAccess) {
      currentBoardId = boardId;
      isControlMode = controlAccess;
      showView('board');

      const settings = allBoards[boardId].settings;
      const titleEl = document.getElementById('currentBoardTitle');
      const subtitleEl = document.getElementById('currentBoardSubtitle');
      
      titleEl.innerText = settings.title;
      subtitleEl.innerText = settings.subtitle;
      
      const badge = document.getElementById('modeBadge');
      if(isControlMode) {
        badge.innerText = t().controlMode;
        badge.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-purple-100 text-purple-800 uppercase tracking-wider";
        document.getElementById('addItemSection').classList.remove('hidden');
        titleEl.classList.add('editable-text');
        subtitleEl.classList.add('editable-text');
      } else {
        badge.innerText = t().spectateMode;
        badge.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-blue-100 text-blue-800 uppercase tracking-wider";
        document.getElementById('addItemSection').classList.add('hidden');
        titleEl.classList.remove('editable-text');
        subtitleEl.classList.remove('editable-text');
      }

      const itemsRef = ref(db, `boards/${boardId}/items`);
      onValue(itemsRef, (snapshot) => {
        currentBoardItems = snapshot.val() || {};
        renderBoardItems();
      });
    }

    // Editable Titles logic
    document.getElementById('currentBoardTitle').onclick = () => {
        if(!isControlMode) return;
        uiPrompt(t().title, t().editTitleMsg, allBoards[currentBoardId].settings.title, (newTitle) => {
            if(!newTitle) return;
            const isDuplicate = Object.entries(allBoards).some(([id, board]) => id !== currentBoardId && board.settings.title.toLowerCase() === newTitle.toLowerCase());
            if(isDuplicate) {
                uiAlert(t().error, t().exists);
                return;
            }
            update(ref(db, `boards/${currentBoardId}/settings`), { title: newTitle });
        });
    };

    document.getElementById('currentBoardSubtitle').onclick = () => {
        if(!isControlMode) return;
      uiPrompt(t().subtit, t().editSubMsg, allBoards[currentBoardId].settings.subtitle, (newSub) => {
         update(ref(db, `boards/${currentBoardId}/settings`), { subtitle: newSub });
        });
    };

    document.getElementById('backBtn').onclick = () => {
      currentBoardId = null;
      window.history.pushState({}, '', '/');
      showView('main');
      renderBoards();
    };

    function renderBoardItems() {
      const container = document.getElementById('itemsList');
      container.innerHTML = "";

      const sortedIds = Object.keys(currentBoardItems).sort((a, b) => {
        return (currentBoardItems[b].score || 0) - (currentBoardItems[a].score || 0);
      });

      sortedIds.forEach((id, i) => {
        const item = currentBoardItems[id];
        const el = document.createElement('div');
        
        let rankClass = "";
        if (i === 0) rankClass = "rank-gold";
        else if (i === 1) rankClass = "rank-silver";
        else if (i === 2) rankClass = "rank-bronze";

        el.className = `row-item glass-card ${rankClass}`;
        
        let controlsHtml = "";
        if(isControlMode) {
          controlsHtml = `
            <div class="hover-controls" style="flex-direction: column;">
              <div class="score-btns">
                <button class="btn-minus" onclick="changeScore('${id}', -3)">-3</button>
                <button class="btn-minus" onclick="changeScore('${id}', -2)">-2</button>
                <button class="btn-minus" onclick="changeScore('${id}', -1)">-1</button>
                <button class="btn-plus" onclick="changeScore('${id}', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('${id}', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('${id}', 3)">+3</button>
              </div>
              <button class="btn-del" onclick="deleteItem('${id}')">${t().deleteBtn}</button>
            </div>
          `;
        }

        const rankIcon = i === 0 ? "🏆" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : (i + 1)));

        el.innerHTML = `
          <div class="player-info">
            <div style="display:flex; align-items:center; gap:14px; font-size:18px;">
              <span style="font-weight:800; font-size: 22px; width: 30px; text-align: center;">${rankIcon}</span>
              <div>
                <div style="font-weight:700; color: #1e293b;">${item.name}</div>
                <div style="font-size:13px; color:var(--muted); margin-top:2px;">${item.extra || ''}</div>
              </div>
            </div>
            <div style="font-size: 32px; font-weight: 800; letter-spacing: -1px; color: #0f172a;">${item.score}</div>
          </div>
          ${controlsHtml}
        `;
        container.appendChild(el);
      });
      applyGlassEffects();
    }

    window.changeScore = function(id, delta) {
      if(!isControlMode) return;
      const current = currentBoardItems[id].score || 0;
      update(ref(db, `boards/${currentBoardId}/items/${id}`), { score: current + delta });
      beep(700, 100);
    };

    window.deleteItem = function(id) {
      if(!isControlMode) return;
          uiConfirm(t().deleteRecord, t().sureRemove, () => {
        remove(ref(db, `boards/${currentBoardId}/items/${id}`));
      });
    };

    document.getElementById('addItemBtn').onclick = () => {
      const n = document.getElementById('newItemName');
      const e = document.getElementById('newItemExtra');
      const s = document.getElementById('newItemScore');

            if (!n.value.trim()) return uiAlert(t().warning, t().nameReq);

      push(ref(db, `boards/${currentBoardId}/items`), {
        name: n.value.trim(),
        extra: e.value.trim(),
        score: Number(s.value || 0)
      });

      n.value = ""; e.value = ""; s.value = "";
      n.focus();
    };

    function applyGlassEffects() {
      document.querySelectorAll('.glass-card').forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty('--mouse-x', `${x}%`);
          card.style.setProperty('--mouse-y', `${y}%`);
        });
      });
    }
  </script>

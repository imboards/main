<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋Boards System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0f172a; 
      --bg-light: #f1f5f9;
      --panel: rgba(255, 255, 255, 0.65);
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #7c3aed;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg-light);
      background-image: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--panel);
      border-radius: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-card::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient( 800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(168, 85, 247, 0.12), rgba(236, 72, 153, 0.08), rgba(56, 189, 248, 0.08), transparent 40% );
      opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 1;
    }

    .glass-card::after {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 4px;
      background: radial-gradient( 300px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(168, 85, 247, 0.9), rgba(255, 0, 0, 0.9) 25%, rgba(16, 185, 129, 0.9) 65%, rgba(59, 130, 246, 0.9) 75%, transparent 100% ); 
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 2;
    }

    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px -10px rgba(124, 58, 237, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
    }
    .glass-card:hover::before, .glass-card:hover::after { opacity: 1; }
    .glass-card > * { position: relative; z-index: 3; }

    .form-reveal-container {
      max-width: 120px; max-height: 6px; margin: -10px auto 30px;
      background: linear-gradient(90deg, #a855f7, #7c3aed, #c084fc); border-radius: 10px; overflow: hidden;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.5); cursor: pointer;
    }
    .form-reveal-container:focus { outline: none; }
    .form-reveal-container:hover, .form-reveal-container:focus, .form-reveal-container:focus-within {
      max-width: 100%; max-height: 400px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px);
      border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 1.25rem; cursor: default; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .reveal-content { padding: 24px; opacity: 0; transform: translateY(-15px); transition: all 0.4s ease; pointer-events: none; }
    .form-reveal-container:hover .reveal-content, .form-reveal-container:focus .reveal-content, .form-reveal-container:focus-within .reveal-content {
      opacity: 1; transform: translateY(0); pointer-events: auto; transition-delay: 0.15s;
    }

    .modal {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); display: flex; align-items: center; justify-content: center;
      z-index: 99999; backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal.show { opacity: 1; pointer-events: auto; }
    .modal-box { width: 90%; max-width: 400px; padding: 30px 24px; text-align: center; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .modal.show .modal-box { transform: scale(1); }
    .modal-box h3 { margin-bottom: 12px; color: #1e293b; font-size: 1.6rem; font-weight: 800; }
    .modal-box p { color: var(--muted); margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4; }
    .modal-actions { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
    .btn-cancel { background: rgba(148, 163, 184, 0.2); color: #334155; border: 1px solid rgba(148, 163, 184, 0.3); }
    .btn-cancel:hover { background: rgba(148, 163, 184, 0.4); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }

    .container { width: 100%; max-width: 720px; padding: 28px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.4); }

    h1 {
      margin: 0 0 20px; text-align: center; font-size: clamp(2.5rem, 4vw, 3.5rem); font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      background: linear-gradient(90deg, #1e293b, #7c3aed, #2563eb); -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 30px rgba(168, 85, 247, 0.2); position: relative;
    }

    .form-grid { display: grid; gap: 3px; margin-bottom: 24px; }
    .add-board-form { grid-template-columns: 1fr 1fr; }
    .add-item-form { grid-template-columns: 1fr 1fr 0.8fr 0.8fr; }
    .btn-copy { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }
    .btn-copy:hover { background: #f1f5f9; color: var(--accent); border-color: var(--accent); }

    input {
      width: 100%; padding: 14px 16px; border-radius: 10px; border: 2px solid rgba(0, 0, 0, 0.05); outline: none; text-align: center;
      background: rgba(255, 255, 255, 0.8); color: #000; font-size: 16px; font-family: inherit; transition: all 0.3s ease;
    }
    input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2), 0 0 20px rgba(168, 85, 247, 0.15); transform: translateY(-2px); }

    button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; font-family: inherit; transition: all 0.2s ease; }
    button:active { transform: scale(0.95); }
    .btn-add { background: linear-gradient(135deg, #c084fc, #8b5cf6); color: white; box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3); text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .btn-add:hover { box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4); transform: translateY(-3px); }

    .row-item {
      padding: 18px 24px; border-radius: 1.25rem; margin-bottom: 16px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; display: flex; flex-direction: column;
    }
    .row-item::before { 
      content: ""; position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: var(--accent); transition: all 0.3s ease; z-index: 10; 
      border-top-left-radius: 1.25rem; border-bottom-left-radius: 1.25rem;
    }
    .row-item:hover { transform: translateY(-5px) scale(1.01); background: #ffffff; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); }

    .rank-gold { background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(254, 240, 138, 0.4)); border: 1px solid rgba(250, 204, 21, 0.6); box-shadow: 0 10px 30px rgba(234, 179, 8, 0.2); }
    .rank-gold::before { background: linear-gradient(to bottom, #fde047, #eab308); width: 8px; }
    .rank-silver { background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(226, 232, 240, 0.6)); border: 1px solid rgba(148, 163, 184, 0.5); box-shadow: 0 10px 30px rgba(148, 163, 184, 0.2); }
    .rank-silver::before { background: linear-gradient(to bottom, #cbd5e1, #94a3b8); width: 8px; }
    .rank-bronze { background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(254, 215, 170, 0.4)); border: 1px solid rgba(249, 115, 22, 0.4); box-shadow: 0 10px 30px rgba(249, 115, 22, 0.15); }
    .rank-bronze::before { background: linear-gradient(to bottom, #fdba74, #ea580c); width: 8px; }

    .board-info, .player-info { display: flex; justify-content: space-between; align-items: center; gap: 12px; width: 100%; }
    .board-title { font-size: 22px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; position: relative; z-index: 15;}
    .board-subtitle { font-size: 15px; color: var(--muted); font-weight: 500; }
    .views-badge { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 800; color: #a855f7; background: rgba(168,85,247,0.1); padding: 4px 12px; border-radius: 12px;}

    .hover-controls {
      display: flex; gap: 10px; justify-content: center; opacity: 0; transform: translateY(15px); pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 0; overflow: hidden; margin-top: 0; width: 100%;
    }
    .row-item:hover .hover-controls { opacity: 1; transform: translateY(0); pointer-events: auto; height: auto; margin-top: 16px; overflow: visible; }

    .info-custom { position: absolute; top: 20px; left: 20px; z-index: 1000; }
    .info-btn { 
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
      font-size: 20px; cursor: pointer; color: var(--accent); border: 1px solid rgba(255, 255, 255, 0.4); 
      padding: 0;
    }
    .info-tooltip { 
      position: absolute; top: calc(100% + 12px); left: 0; width: 280px; padding: 16px; 
      transform: translateY(-10px); opacity: 0; transition: all 0.3s ease; pointer-events: none; 
      text-align: left;
    }
    .info-tooltip.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

    .lang-custom { position: absolute; top: 20px; right: 20px; z-index: 1000; }
    .lang-trigger { display: flex; align-items: center; padding: 10px 18px; border: 1px solid rgba(255, 255, 255, 0.4); cursor: pointer; font-weight: 600; font-size: 14px; }
    .lang-dropdown { position: absolute; top: calc(100% + 12px); right: 0; width: 180px; padding: 8px; display: none; flex-direction: column; gap: 4px; transform: translateY(-10px); opacity: 0; transition: all 0.3s ease; }
    .lang-dropdown.show { display: flex; transform: translateY(0); opacity: 1; }
    .lang-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text); }
    .lang-option:hover { background: rgba(124, 58, 237, 0.1); color: var(--accent); transform: translateX(5px); }

    @media (max-width: 640px) { 
      .add-board-form { grid-template-columns: 1fr; } 
      .add-item-form { grid-template-columns: 1fr 1fr; } 
      #addItemBtn { grid-column: 1 / -1; } 
      .hover-controls { flex-direction: column; }
      .lang-custom { top: 10px; right: 10px; } 
      .lang-trigger { padding: 8px 12px; font-size: 13px; }
      .info-custom { top: 10px; left: 10px; }
      .info-btn { width: 38px; height: 38px; font-size: 16px; }
    }

    .btn-spectate { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; width: 100%; }
    .btn-spectate:hover { background: #3b82f6; color: white; border-color: #2563eb; }
    .btn-control { background: #faf5ff; color: #7e22ce; border: 1px solid #e9d5ff; width: 100%; }
    .btn-control:hover { background: #a855f7; color: white; border-color: #9333ea; }
    .btn-del { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; width: 100%; }
    .btn-del:hover { background: #ef4444; color: white; border-color: #dc2626; }
    .score-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; width: 100%; }
    .btn-minus { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
    .btn-minus:hover { background: #f59e0b; color: white; }
    .btn-plus { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .btn-plus:hover { background: #22c55e; color: white; }

    .editable-text { display: inline-flex; align-items: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .editable-text:hover { color: var(--accent); transform: translateX(4px); }
    .editable-text:hover::after { content: "\f040"; font-family: "Font Awesome 6 Free"; font-weight: 900; font-size: 0.6em; margin-left: 10px; opacity: 0.7; }
    .list-header { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; margin-bottom: 25px; padding: 10px; }
    .list-header h2 { font-size: 2.5rem; color: #1e293b; margin: 0; font-weight: 800; }
    .list-header p { color: #64748b; margin: 0; font-size: 1.2rem; }
    
    /* === ОБНОВЛЕННЫЕ СТИЛИ ТЕГОВ (АТРИБУТОВ) === */
    .attr-wrapper { 
      position: relative; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      z-index: 20; 
      outline: none; 
    }
    .attr-badge { 
      font-size: 11px; 
      font-weight: 800; 
      padding: 4px 10px; 
      border-radius: 20px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      white-space: nowrap; 
      display: inline-block;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--tag-color);
      color: var(--tag-color);
    }
    .attr-badge::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--tag-color);
      opacity: 0.15;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1;
    }
    .attr-badge span {
      position: relative;
      z-index: 2;
      transition: color 0.3s ease;
    }
    .attr-wrapper:hover .attr-badge, .attr-wrapper:focus .attr-badge, .attr-wrapper:active .attr-badge { 
      transform: translateY(-3px) scale(1.05); 
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); 
      border-color: transparent !important;
    }
    .attr-wrapper:hover .attr-badge::before, .attr-wrapper:focus .attr-badge::before, .attr-wrapper:active .attr-badge::before {
      opacity: 1;
    }
    .attr-wrapper:hover .attr-badge span, .attr-wrapper:focus .attr-badge span, .attr-wrapper:active .attr-badge span {
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    /* === СТИЛИ ДЛЯ НОВОЙ ВЫЕЗЖАЮЩЕЙ ПАНЕЛИ === */
    #tagDimOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    #tagInfoPanel.show {
      transform: translate(-50%, 0);
      pointer-events: auto;
    }
  </style>
</head>
<body>
  
  <div id="flashOverlay" class="fixed inset-0 z-[9999999] pointer-events-none opacity-0 transition-opacity duration-300"></div>

  <div id="tagDimOverlay" class="fixed inset-0 z-[999990] bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-400 cursor-pointer" onclick="hideTagPanel()"></div>

  <div id="tagInfoPanel" class="fixed top-0 left-1/2 -translate-x-1/2 -translate-y-[150%] z-[999991] w-[90%] max-w-sm transition-transform duration-500 ease-[cubic-bezier(0.175,0.885,0.32,1.275)] mt-6 cursor-pointer" onclick="hideTagPanel()">
    <div class="p-6 text-center rounded-3xl shadow-2xl" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); color: #fff;">
      <div id="tagInfoContent" class="text-base leading-relaxed font-sans"></div>
      <div id="tagCloseText" class="mt-4 text-[10px] text-slate-400 opacity-60 uppercase tracking-widest"></div>
    </div>
  </div>

  <div id="blockOverlay" class="fixed inset-0 z-[999999] bg-slate-900/80 backdrop-blur-xl flex flex-col items-center justify-center text-white hidden">
      <div class="relative w-24 h-24 mb-6 flex items-center justify-center">
        <div class="absolute inset-0 bg-red-500 rounded-full animate-ping opacity-20"></div>
        <i class="fa-solid fa-lock text-5xl text-red-500 relative z-10"></i>
      </div>
      <h2 class="text-4xl font-bold mb-4 text-center tracking-tight" id="blockOverlayTitle">Access Blocked</h2>
      <p class="text-xl text-slate-300 text-center max-w-lg px-6 leading-relaxed bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-2xl" id="blockOverlayMsg">Message goes here...</p>
  </div>

  <div class="info-custom" id="infoWrapper">
    <button class="info-btn glass-card" id="infoTrigger" title="Information">
      <i class="fa-solid fa-circle-info"></i>
    </button>
    <div class="info-tooltip glass-card" id="infoTooltip">
      <h4 id="infoTitle" class="text-lg font-bold mb-2 text-slate-800">How to use</h4>
      <p id="infoText" class="text-sm mb-4 text-slate-600 leading-relaxed" style="white-space: pre-line;"></p>
      <button id="infoActionBtn" class="btn-add w-full py-2 text-sm">Create your own board</button>
    </div>
  </div>

  <div class="lang-custom" id="langSwitcher">
    <button class="lang-trigger glass-card" id="langTrigger">
      <span id="activeLangFlag">🇬🇧</span> 
      <span id="activeLangText" class="ml-2">English</span>
      <i class="fa-solid fa-chevron-down ml-3 text-[10px] opacity-50"></i>
    </button>
    <div class="lang-dropdown glass-card" id="langMenu">
      <div class="lang-option" data-value="en"><span>🇬🇧</span> English</div>
      <div class="lang-option" data-value="ru"><span>🇷🇺</span> Русский</div>
      <div class="lang-option" data-value="uz"><span>🇺🇿</span> O'zbekcha</div>
    </div>
  </div>

  <div>ᅠ</div><div>ᅠ</div>
  <div id="loader" class="fixed inset-0 z-[9999] flex items-center justify-center bg-[#f1f5f9]">
    <div class="flex flex-col items-center gap-8">
        <div class="relative w-40 h-40 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border border-purple-500/20"></div>
            <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-purple-600 border-r-fuchsia-500 animate-spin shadow-[0_0_30px_rgba(168,85,247,0.5)]"></div>
        </div>
        <div class="text-sm font-bold font-mono text-purple-600 tracking-widest animate-pulse">Getting access...</div>
    </div>
  </div>

  <div id="customAlert" class="modal">
    <div class="modal-box glass-card">
      <h3 id="alertTitle">Notice</h3>
      <p id="alertMessage">Message</p>
      <button id="alertOkBtn" class="btn-add" style="width: 100%;">OK</button>
    </div>
  </div>

  <div id="customConfirm" class="modal">
    <div class="modal-box glass-card">
      <h3 id="confirmTitle">Confirm</h3>
      <p id="confirmMessage">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="btn-cancel" style="flex:1;">Cancel</button>
        <button id="confirmYesBtn" class="btn-danger" style="flex:1;">Confirm</button>
      </div>
    </div>
  </div>

  <div id="customPrompt" class="modal">
    <div class="modal-box glass-card">
      <h3 id="promptTitle">Input</h3>
      <p id="promptMessage">Enter value:</p>
      <input type="text" id="promptInput" style="margin-bottom: 15px;">
      <div class="modal-actions">
        <button id="promptCancelBtn" class="btn-cancel" style="flex:1;">Cancel</button>
        <button id="promptSaveBtn" class="btn-add" style="flex:1;">Save</button>
      </div>
    </div>
  </div>

  <div id="authModal" class="modal">
    <div class="modal-box glass-card">
      <h3 id="authTitle">Control Panel</h3>
      <p id="authDesc">Enter password to access.</p>
      <input id="authPass" type="password" placeholder="Password" style="margin-bottom: 15px;">
      <div class="modal-actions">
        <button id="authCancel" class="btn-cancel" style="flex:1;">Cancel</button>
        <button id="authEnter" class="btn-add" style="flex:1;">Enter</button>
      </div>
    </div>
  </div>

  <div id="main-view" style="display: none; width: 100%; max-width: 800px;">
    <div class="container glass-card">
      <h1>📋 Boards System</h1>
      <div>ᅠ</div>
      <div class="form-reveal-container" tabindex="0">
        <div class="reveal-content">
          <div class="form-grid add-board-form" style="margin-bottom: 0;">
            <input id="newBoardTitle" placeholder="Title">
            <input id="newBoardSubtitle" placeholder="Subtitle">
            <input id="newBoardPass" type="password" placeholder="Password">
            <button id="addBoardBtn" class="btn-add">Create New List</button>
          </div>
        </div>
      </div>
      <input type="text" id="searchInput" placeholder="🔍 Search lists..." style="margin-bottom: 20px;">
      <div id="boardsList"></div>
    </div>
  </div>

  <div id="board-view" style="display: none; width: 100%; max-width: 800px;">
    <div class="container glass-card">
      <button id="backBtn" class="btn-cancel" style="margin-bottom: 15px; padding: 10px 16px; border-radius: 10px;">
        <i class="fa-solid fa-arrow-left"></i> Back
      </button>

      <div class="list-header">
        <h2 id="currentBoardTitle" title="Click to edit title">Title</h2>
        <div id="currentBoardAttrs" style="display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 5px; z-index: 20; position: relative;"></div>
        <p id="currentBoardSubtitle" title="Click to edit subtitle">Subtitle</p>
        <div class="flex items-center gap-4 mt-2">

    const translations = {

        addBtn: "Qo'shish", cancel: "Bekor qilish", enter: "Kirish", confirm: "Tasdiqlash", save: "Saqlash", alertNotice: "Eslatma", alertOk: "OK", deleteListTitle: "Ro'yxatni o'chirish",phTitle: "Ro'yxat nomi",
        phSubtitle: "Tavsif", phPass: "Parol", phName: "Ism / Nom", phExtra: "Qo'shimcha", phScore: "Ball", deleteListMsg: "Ro'yxatni butunlay o'chirish uchun parolni kiriting",

        exists: "Bunday nomdagi ro'yxat allaqachon mavjud!", error: "Xatolik", notFound: "Ro'yxat topilmadi!", deleteRecord: "Yozuvni o'chirish", sureRemove: "Ushbu ishtirokchini o'chirib tashlashga ishonchingiz komilmi?",
        sureDeleteList: "Haqiqatan ham o'chirmoqchimisiz:", spectateBtn: "Kuzatish", controlBtn: "Boshqarish", deleteBtn: "O'chirish", editTitleMsg: "Yangi nomni kiriting:", title: "Ro'yxat nomi", subtit: "Tavsif",
        linkerr: "Nusxa olishda xatolik yuz berdi!", editSubMsg: "Yangi tavsifni kiriting:", blockedTitle: "Kirish yopildi", alertSys: "Tizim xabari",
        infoTitle: "Qanday ishlatiladi", infoText: "1. Parol o'ylab topib, ro'yxat yarating.\n2. Boshqalar kuzatishi uchun havolani ulashing.\n3. Ishtirokchilar va ballarni o'zgartirish uchun parol orqali 'Boshqarish' rejimiga kiring.", createYours: "O'z ro'yxatingizni yarating!",
        tagInfo: "✨ Nishon Belgisi<br><span style='font-weight:400; font-size:12px; color:#cbd5e1; display:block; margin-top:4px;'>Loyiha yaratuvchisi tomonidan rasmiy va tasdiqlangan ro'yxatlarni ajratib ko'rsatish uchun beriladi.</span>"
      }
    };

    let currentLang = localStorage.getItem('appLang');
    if (!currentLang) {
      const browserLang = navigator.language.slice(0, 2);
      currentLang = ['ru', 'uz'].includes(browserLang) ? browserLang : 'en';
    }
    const t = () => translations[currentLang];

    // ГЛОБАЛЬНЫЕ ФУНКЦИИ ПАНЕЛИ ИНФОРМАЦИИ
    window.showTagPanel = function(e) {
      if(e) e.stopPropagation();
      document.getElementById('tagInfoContent').innerHTML = t().tagInfo;
      
      document.getElementById('tagCloseText').innerText = 
          currentLang === 'ru' ? 'Нажмите в любом месте чтобы закрыть' : 
          currentLang === 'uz' ? 'Yopish uchun istalgan joyni bosing' : 
          'Tap anywhere to close';

      document.getElementById('tagDimOverlay').classList.add('show');
      document.getElementById('tagInfoPanel').classList.add('show');
    };

    window.hideTagPanel = function() {
      document.getElementById('tagDimOverlay').classList.remove('show');
      document.getElementById('tagInfoPanel').classList.remove('show');
    };

    function updateUI() {
      document.querySelector('h1').innerHTML = t().appTitle;
      document.getElementById('searchInput').placeholder = t().searchPlaceholder;
      document.getElementById('addBoardBtn').innerText = t().createListBtn;
      document.getElementById('backBtn').innerHTML = `<i class="fa-solid fa-arrow-left"></i> ${t().backBtn}`;
      document.getElementById('addItemBtn').innerText = t().addBtn;
      document.getElementById('newBoardTitle').placeholder = t().phTitle;
      document.getElementById('newBoardSubtitle').placeholder = t().phSubtitle;
      document.getElementById('newBoardPass').placeholder = t().phPass;
      document.getElementById('newItemName').placeholder = t().phName;
      document.getElementById('newItemExtra').placeholder = t().phExtra;
      document.getElementById('newItemScore').placeholder = t().phScore;
      document.title = t().appTitle; 
      document.getElementById('authPass').placeholder = t().pass;
      document.getElementById('footerText').innerText = t().madeBy;
      document.getElementById('alertOkBtn').innerText = t().alertOk;
      document.getElementById('confirmCancelBtn').innerText = t().cancel;
      document.getElementById('confirmYesBtn').innerText = t().confirm;
      document.getElementById('promptCancelBtn').innerText = t().cancel;
      document.getElementById('promptSaveBtn').innerText = t().save;
      document.getElementById('authCancel').innerText = t().cancel;
      document.getElementById('authEnter').innerText = t().enter;
      document.getElementById('blockOverlayTitle').innerText = t().blockedTitle;

      document.getElementById('infoTitle').innerText = t().infoTitle;
      document.getElementById('infoText').innerText = t().infoText;
      document.getElementById('infoActionBtn').innerText = t().createYours;

      const langData = { en: { flag: '🇬🇧', name: 'English' }, ru: { flag: '🇷🇺', name: 'Русский' }, uz: { flag: '🇺🇿', name: "O'zbekcha" } };
      document.getElementById('activeLangFlag').innerText = langData[currentLang].flag;
      document.getElementById('activeLangText').innerText = langData[currentLang].name;

      const badge = document.getElementById('modeBadge');
      if (badge && currentBoardId) badge.innerText = isControlMode ? t().controlMode : t().spectateMode;

      if (currentBoardId === null) { renderBoards(document.getElementById('searchInput').value.toLowerCase()); } 
      else { 
        if(allBoards[currentBoardId]) {
           document.getElementById('currentBoardAttrs').innerHTML = renderAttributesHTML(allBoards[currentBoardId].settings.attributes);
        }
        renderBoardItems(); 
      }
    }

    const langTrigger = document.getElementById('langTrigger');
    const langMenu = document.getElementById('langMenu');
    langTrigger.addEventListener('click', (e) => { 
      e.stopPropagation(); 
      langMenu.classList.toggle('show'); 
      document.getElementById('infoTooltip').classList.remove('show');
    });
    document.querySelectorAll('.lang-option').forEach(option => {
      option.addEventListener('click', function() {
        const val = this.getAttribute('data-value');
        currentLang = val; localStorage.setItem('appLang', val);
        langMenu.classList.remove('show'); updateUI();
      });
    });

    const infoTrigger = document.getElementById('infoTrigger');
    const infoTooltip = document.getElementById('infoTooltip');
    const infoActionBtn = document.getElementById('infoActionBtn');

    infoTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      infoTooltip.classList.toggle('show');
      langMenu.classList.remove('show');
    });

    infoActionBtn.addEventListener('click', () => {
      infoTooltip.classList.remove('show');
      if (currentBoardId !== null) {
        currentBoardId = null; 
        window.history.pushState({}, '', '/'); 
        showView('main'); 
        renderBoards();
      }
      setTimeout(() => {
        const titleInput = document.getElementById('newBoardTitle');
        if(titleInput) {
          titleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
          titleInput.focus();
        }
      }, 100);
    });

    document.addEventListener('click', () => {
      langMenu.classList.remove('show');
      infoTooltip.classList.remove('show');
    });

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function beep(f = 600, t = 80, v = 0.05) {
      if(audioCtx.state === 'suspended') return;
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.frequency.value = f; o.type = "sine"; g.gain.value = v; o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + t / 1000);
    }
    document.addEventListener("click", () => { if (audioCtx.state === "suspended") audioCtx.resume(); }, { once: true });

    function uiAlert(title, message) {
      document.getElementById('alertTitle').innerText = title;
      document.getElementById('alertMessage').innerText = message;
      const modal = document.getElementById('customAlert'); modal.classList.add('show');
      document.getElementById('alertOkBtn').onclick = () => modal.classList.remove('show');
    }
    function uiConfirm(title, message, onConfirm) {
      document.getElementById('confirmTitle').innerText = title;
      document.getElementById('confirmMessage').innerText = message;
      const modal = document.getElementById('customConfirm'); modal.classList.add('show');
      document.getElementById('confirmCancelBtn').onclick = () => modal.classList.remove('show');
      document.getElementById('confirmYesBtn').onclick = () => { modal.classList.remove('show'); onConfirm(); };
    }
    function uiPrompt(title, message, defaultVal, onSave) {
      document.getElementById('promptTitle').innerText = title;
      document.getElementById('promptMessage').innerText = message;
      const input = document.getElementById('promptInput'); input.value = defaultVal || '';
      const modal = document.getElementById('customPrompt'); modal.classList.add('show'); input.focus();
      document.getElementById('promptCancelBtn').onclick = () => modal.classList.remove('show');
      document.getElementById('promptSaveBtn').onclick = () => { modal.classList.remove('show'); onSave(input.value.trim()); };
    }

    let allBoards = {};
    let systemBlocks = {};
    let currentBoardId = null;
    let isControlMode = false;
    let currentBoardItems = {};

    const views = { loader: document.getElementById('loader'), main: document.getElementById('main-view'), board: document.getElementById('board-view') };
    function showView(viewName) { Object.values(views).forEach(v => v.style.display = 'none'); if(viewName === 'loader') views.loader.style.display = 'flex'; else views[viewName].style.display = 'block'; checkBlockState(); }
    const urlParams = new URLSearchParams(window.location.search);
    const boardFromUrl = urlParams.get('board');

    function checkBlockState() {
      let isBlocked = false;
      let blockMsg = "";
      const currentRoleEval = currentBoardId === null ? 'spectate' : (isControlMode ? 'control' : 'spectate');

      if (currentBoardId === null) {
        const mainBlock = systemBlocks['main'];
        if (mainBlock?.active && mainBlock.roles?.includes(currentRoleEval)) {
           isBlocked = true;
           blockMsg = mainBlock.payload || "Access Blocked";
        }
      } else {
        const boardBlock = allBoards[currentBoardId]?.settings?.block;
        if (boardBlock?.active && boardBlock.roles?.includes(currentRoleEval)) {
           isBlocked = true;
           blockMsg = boardBlock.payload || "Access Blocked";
        }
      }

      const blockOverlay = document.getElementById('blockOverlay');
      if(isBlocked) {
        document.getElementById('blockOverlayMsg').innerText = blockMsg;
        blockOverlay.classList.remove('hidden');
      } else {
        blockOverlay.classList.add('hidden');
      }
    }

    function isActionBlocked(targetLoc, actionRole) {
      if (targetLoc === 'main') {
         const mainBlock = systemBlocks['main'];
         return mainBlock?.active && mainBlock.roles?.includes(actionRole) ? (mainBlock.payload || t().accessDenied) : null;
      } else {
         const boardBlock = allBoards[targetLoc]?.settings?.block;
         return boardBlock?.active && boardBlock.roles?.includes(actionRole) ? (boardBlock.payload || t().accessDenied) : null;
      }
    }

    const connectTime = Date.now();
    const eventsRef = query(ref(db, 'events'), orderByChild('timestamp'), startAt(connectTime));
    onChildAdded(eventsRef, (snapshot) => {
      const ev = snapshot.val();
      if(!ev) return;
      
      const currentLoc = currentBoardId === null ? 'main' : currentBoardId;
      const currentViewRole = currentBoardId === null ? 'spectate' : (isControlMode ? 'control' : 'spectate');

      const isTargeted = ev.targets && ev.targets.includes(currentLoc);
      const isRoleMatched = ev.roles && ev.roles.includes(currentViewRole);

      if(isTargeted && isRoleMatched) {
        if(ev.type === 'confetti') {
          confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, zIndex: 99999 });
          beep(900, 150);
        } else if(ev.type === 'alert') {
          uiAlert(t().alertSys, ev.payload);
          beep(400, 300);
        } else if (ev.type === 'flash') {
          const overlay = document.getElementById('flashOverlay');
          overlay.style.backgroundColor = ev.color || '#ffffff';
          overlay.style.opacity = '0.8';
          beep(800, 100);
          setTimeout(() => { overlay.style.opacity = '0'; }, 150);
        }
      }
    });

    onValue(ref(db, 'system/blocks'), (snapshot) => {
       systemBlocks = snapshot.val() || {};
       checkBlockState();
    });

    let firstLoad = true;
    const boardsRef = ref(db, 'boards');
    onValue(boardsRef, (snapshot) => {
      allBoards = snapshot.val() || {};
      checkBlockState();

      if (firstLoad) {
        setTimeout(() => { 
          firstLoad = false;
          if (!boardFromUrl) { showView('main'); updateUI(); renderBoards(); } 
          else {
            if (allBoards[boardFromUrl]) { openBoard(boardFromUrl, false); } 
            else { uiAlert(t().error, t().notFound); window.history.pushState({}, '', '/'); showView('main'); renderBoards(); }
          }
        }, 800);
      } else {
        if (currentBoardId === null) { renderBoards(document.getElementById('searchInput').value.toLowerCase()); } 
        else if (allBoards[currentBoardId]) {
          const s = allBoards[currentBoardId].settings;
          document.getElementById('currentBoardTitle').innerText = s.title;
          document.getElementById('currentBoardSubtitle').innerText = s.subtitle;
          document.getElementById('currentBoardViews').innerText = s.views || 0;
          document.getElementById('currentBoardAttrs').innerHTML = renderAttributesHTML(s.attributes);
        }
      }
    });

    // ОБНОВЛЕННАЯ ФУНКЦИЯ РЕНДЕРА ТЕГОВ
    function renderAttributesHTML(attributes) {
      if (!attributes || !Array.isArray(attributes) || attributes.length === 0) return "";
      return attributes.map(a => {
        const text = a.texts ? (a.texts[currentLang] || a.texts.en || '') : (a.text || '');
        return `
          <div class="attr-wrapper" tabindex="0" onclick="showTagPanel(event)">
            <span class="attr-badge" style="--tag-color: ${a.color};">
              <span>${text}</span>
            </span>
          </div>
        `;
      }).join('');
    }

    function renderBoards(filterText = "") {
      const container = document.getElementById('boardsList');
      container.innerHTML = "";
      
      const sortedIds = Object.keys(allBoards).filter(id => {
        const b = allBoards[id].settings;
        return !filterText || b.title.toLowerCase().includes(filterText) || b.subtitle.toLowerCase().includes(filterText);
      }).sort((a, b) => {
        const sA = allBoards[a].settings;
        const sB = allBoards[b].settings;
        const attrCountA = sA.attributes ? sA.attributes.length : 0;
        const attrCountB = sB.attributes ? sB.attributes.length : 0;
        if(attrCountA !== attrCountB) return attrCountB - attrCountA;
        const viewA = sA.views || 0;
        const viewB = sB.views || 0;
        return viewB - viewA;
      });
      
      sortedIds.forEach((boardId, i) => {
        const b = allBoards[boardId].settings;
        const el = document.createElement('div');
        
        let rankClass = i === 0 ? "rank-gold" : (i === 1 ? "rank-silver" : (i === 2 ? "rank-bronze" : ""));
        el.className = `row-item glass-card ${rankClass}`;
        
        const viewsCount = b.views || 0;
        const attrsHtml = renderAttributesHTML(b.attributes);

        el.innerHTML = `
          <div class="board-info">
            <div style="flex: 1;">
              <div class="board-title">${b.title}</div>
              <div style="display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; position: relative; z-index: 20;">${attrsHtml}</div>
              <div class="board-subtitle">${b.subtitle}</div>
            </div>
            <div class="views-badge" title="Views">
              <i class="fa-solid fa-eye"></i> ${viewsCount}
            </div>
          </div>
          <div class="hover-controls">
            <div style="display: flex; gap: 10px; width: 100%;">
              <button class="btn-spectate" style="flex: 1; margin: 0;">
                <i class="fa-solid fa-eye"></i> ${t().spectateBtn}
              </button>
              <button class="btn-copy" style="aspect-ratio: 1/1; height: 100%; padding: 0; display: flex; align-items: center; justify-content: center; width: 44px; flex-shrink: 0; margin: 0;" title="Copy Link">
                <i class="fa-solid fa-copy"></i>
              </button>
            </div>
            <button class="btn-control"><i class="fa-solid fa-gear"></i> ${t().controlBtn}</button>
            <button class="btn-del"><i class="fa-solid fa-trash"></i> ${t().deleteBtn}</button>
          </div>
        `;

        el.querySelector('.btn-spectate').onclick = () => {
          window.history.pushState({}, '', `?board=${boardId}`);
          openBoard(boardId, false);
        };
        el.querySelector('.btn-copy').onclick = (e) => {
          e.stopPropagation();
          const url = `imboards.github.io/main?board=${encodeURIComponent(boardId)}`;
          navigator.clipboard.writeText(url).then(() => {
            const icon = el.querySelector('.btn-copy i');
            icon.className = "fa-solid fa-check text-green-500"; beep(800, 50);
            setTimeout(() => { icon.className = "fa-solid fa-copy text-slate-500"; }, 2000);
          }).catch(() => uiAlert(t().error, t().linkerr));
        };
        el.querySelector('.btn-control').onclick = () => {
          document.getElementById('authPass').value = ''; const modal = document.getElementById('authModal');
          document.getElementById('authTitle').innerText = t().controlMode; document.getElementById('authDesc').innerText = t().pass;
          modal.classList.add('show'); document.getElementById('authPass').focus();
          document.getElementById('authCancel').onclick = () => modal.classList.remove('show');
          document.getElementById('authEnter').onclick = () => {
            if(document.getElementById('authPass').value === b.password) { modal.classList.remove('show'); window.history.pushState({}, '', `?board=${boardId}`); openBoard(boardId, true); } 
            else { uiAlert(t().accessDenied, t().incorrectPass); }
          };
        };

        el.querySelector('.btn-del').onclick = () => {
           const blockMsg = isActionBlocked(boardId, 'delete');
           if (blockMsg) return uiAlert(t().accessDenied, blockMsg);

           document.getElementById('authPass').value = ''; const authModal = document.getElementById('authModal');
           document.getElementById('authTitle').innerText = t().deleteListTitle; document.getElementById('authDesc').innerText = t().deleteListMsg;
           authModal.classList.add('show'); document.getElementById('authPass').focus();
           document.getElementById('authCancel').onclick = () => authModal.classList.remove('show');
           document.getElementById('authEnter').onclick = () => {
             if(document.getElementById('authPass').value === b.password) {
                authModal.classList.remove('show');
                uiConfirm(t().deleteListTitle, `${t().sureDeleteList} "${b.title}"?`, () => remove(ref(db, `boards/${boardId}`)));
             } else { uiAlert(t().accessDenied, t().incorrectPass); }
           };
        };
        container.appendChild(el);
      });
      applyGlassEffects();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => renderBoards(e.target.value.toLowerCase()));

    document.getElementById('addBoardBtn').onclick = () => {
      const title = document.getElementById('newBoardTitle').value.trim();
      const subtitle = document.getElementById('newBoardSubtitle').value.trim();
      const pass = document.getElementById('newBoardPass').value;
      if(!title || !pass) return uiAlert(t().warning, t().titleReq);
      const safeId = title.trim().toLowerCase().replace(/\s+/g, '-').replace(/[.#$[\]]/g, ""); 
      const isDuplicate = Object.values(allBoards).some(b => b.settings.title.toLowerCase() === title.toLowerCase());
      if(isDuplicate) return uiAlert(t().error, t().exists);
      set(ref(db, `boards/${safeId}/settings`), { title, subtitle, password: pass, views: 0 });
      document.getElementById('newBoardTitle').value = ""; document.getElementById('newBoardSubtitle').value = ""; document.getElementById('newBoardPass').value = "";
    };

    function openBoard(boardId, controlAccess) {
      currentBoardId = boardId;
      isControlMode = controlAccess;
      showView('board');

      const settings = allBoards[boardId].settings;
      const titleEl = document.getElementById('currentBoardTitle');
      const subtitleEl = document.getElementById('currentBoardSubtitle');
      
      titleEl.innerText = settings.title;
      subtitleEl.innerText = settings.subtitle;
      document.getElementById('currentBoardViews').innerText = settings.views || 0;
      document.getElementById('currentBoardAttrs').innerHTML = renderAttributesHTML(settings.attributes);
      
      const badge = document.getElementById('modeBadge');
      if(isControlMode) {
        badge.innerText = t().controlMode; badge.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-purple-100 text-purple-800 uppercase tracking-wider";
        document.getElementById('addItemSection').classList.remove('hidden');
        titleEl.classList.add('editable-text'); subtitleEl.classList.add('editable-text');
      } else {
        badge.innerText = t().spectateMode; badge.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-blue-100 text-blue-800 uppercase tracking-wider";
        document.getElementById('addItemSection').classList.add('hidden');
        titleEl.classList.remove('editable-text'); subtitleEl.classList.remove('editable-text');
        
        update(ref(db, `boards/${boardId}/settings`), { views: increment(1) });
      }

      const itemsRef = ref(db, `boards/${boardId}/items`);
      onValue(itemsRef, (snapshot) => { currentBoardItems = snapshot.val() || {}; renderBoardItems(); });
    }

    document.getElementById('currentBoardTitle').onclick = () => {
        if(!isControlMode) return;
        uiPrompt(t().title, t().editTitleMsg, allBoards[currentBoardId].settings.title, (newTitle) => {
            if(!newTitle) return;
            const isDuplicate = Object.entries(allBoards).some(([id, board]) => id !== currentBoardId && board.settings.title.toLowerCase() === newTitle.toLowerCase());
            if(isDuplicate) { uiAlert(t().error, t().exists); return; }
            update(ref(db, `boards/${currentBoardId}/settings`), { title: newTitle });
        });
    };

    document.getElementById('currentBoardSubtitle').onclick = () => {
        if(!isControlMode) return;
        uiPrompt(t().subtit, t().editSubMsg, allBoards[currentBoardId].settings.subtitle, (newSub) => update(ref(db, `boards/${currentBoardId}/settings`), { subtitle: newSub }));
    };

    document.getElementById('backBtn').onclick = () => {
      currentBoardId = null; window.history.pushState({}, '', '/'); showView('main'); renderBoards();
    };

    function renderBoardItems() {
      const container = document.getElementById('itemsList'); container.innerHTML = "";
      const sortedIds = Object.keys(currentBoardItems).sort((a, b) => (currentBoardItems[b].score || 0) - (currentBoardItems[a].score || 0));

      sortedIds.forEach((id, i) => {
        const item = currentBoardItems[id]; const el = document.createElement('div');
        let rankClass = i === 0 ? "rank-gold" : (i === 1 ? "rank-silver" : (i === 2 ? "rank-bronze" : ""));
        el.className = `row-item glass-card ${rankClass}`;
        
        let controlsHtml = "";
        if(isControlMode) {
          controlsHtml = `
            <div class="hover-controls" style="flex-direction: column;">
              <div class="score-btns">
                <button class="btn-minus" onclick="changeScore('${id}', -3)">-3</button>
                <button class="btn-minus" onclick="changeScore('${id}', -2)">-2</button>
                <button class="btn-minus" onclick="changeScore('${id}', -1)">-1</button>
                <button class="btn-plus" onclick="changeScore('${id}', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('${id}', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('${id}', 3)">+3</button>
              </div>
              <button class="btn-del" onclick="deleteItem('${id}')">${t().deleteBtn}</button>
            </div>`;
        }

        const rankIcon = i === 0 ? "🏆" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : (i + 1)));
        el.innerHTML = `
          <div class="player-info">
            <div style="display:flex; align-items:center; gap:14px; font-size:18px;">
              <span style="font-weight:800; font-size: 22px; width: 30px; text-align: center;">${rankIcon}</span>
              <div>
                <div style="font-weight:700; color: #1e293b;">${item.name}</div>
                <div style="font-size:13px; color:var(--muted); margin-top:2px;">${item.extra || ''}</div>
              </div>
            </div>
            <div style="font-size: 32px; font-weight: 800; letter-spacing: -1px; color: #0f172a;">${item.score}</div>
          </div>${controlsHtml}`;
        container.appendChild(el);
      });
      applyGlassEffects();
    }

    window.changeScore = function(id, delta) { if(!isControlMode) return; const current = currentBoardItems[id].score || 0; update(ref(db, `boards/${currentBoardId}/items/${id}`), { score: current + delta }); beep(700, 100); };
    window.deleteItem = function(id) { 
      if(!isControlMode) return; 
      const blockMsg = isActionBlocked(currentBoardId, 'delete');
      if (blockMsg) return uiAlert(t().accessDenied, blockMsg);

      uiConfirm(t().deleteRecord, t().sureRemove, () => remove(ref(db, `boards/${currentBoardId}/items/${id}`))); 
    };

    document.getElementById('addItemBtn').onclick = () => {
      const n = document.getElementById('newItemName'), e = document.getElementById('newItemExtra'), s = document.getElementById('newItemScore');
      if (!n.value.trim()) return uiAlert(t().warning, t().nameReq);
      push(ref(db, `boards/${currentBoardId}/items`), { name: n.value.trim(), extra: e.value.trim(), score: Number(s.value || 0) });
      n.value = ""; e.value = ""; s.value = ""; n.focus();
    };

    function applyGlassEffects() {
      document.querySelectorAll('.glass-card').forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect(); const x = ((e.clientX - rect.left) / rect.width) * 100, y = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty('--mouse-x', `${x}%`); card.style.setProperty('--mouse-y', `${y}%`);
        });
      });
    }
  </script>
</body>
</html>
